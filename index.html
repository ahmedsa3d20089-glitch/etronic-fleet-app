const FRAUD_THRESHOLD_KM_PER_L = 4.5;

function computeConsumptionByPlate(fuelRecords) {
  const byPlate = {};
  fuelRecords.forEach(r => {
    if (r.odometer) {
      if (!byPlate[r.plate]) byPlate[r.plate] = [];
      byPlate[r.plate].push(r);
    }
  });
  return Object.entries(byPlate).map(([plate, list]) => {
    const s = [...list].sort((a, b) => Number(a.odometer) - Number(b.odometer));
    const distance = s.length > 1 ? Number(s[s.length - 1].odometer) - Number(s[0].odometer) : 0;
    const liters = s.slice(1).reduce((sum, r) => sum + Number(r.liters || 0), 0);
    const kmPerLiter = liters > 0 ? distance / liters : 0;
    return { plate, distance, liters, kmPerLiter, fillCount: s.length };
  }).filter(x => x.distance > 0);
}

function BarChart({ data, unit }) {
  const max = Math.max(...data.map(d => d.value), 1);
  return (
    <div className="space-y-2">
      {data.map(d => (
        <div key={d.label} className="flex items-center gap-2">
          <span className="font-mono text-[11px] w-16 shrink-0 text-right" style={{ color: C.muted }}>{d.label}</span>
          <div className="flex-1 rounded-full overflow-hidden" style={{ background: C.surface2, height: 14 }}>
            <div style={{ width: `${(d.value / max) * 100}%`, height: "100%", background: d.color || C.teal, borderRadius: 999 }} />
          </div>
          <span className="font-mono text-[11px] w-16 shrink-0" style={{ color: d.color || C.text }}>{d.value.toFixed(2)}{unit || ""}</span>
        </div>
      ))}
    </div>
  );
}

  return (
    <div>

  const patterns = [
    /@(-?\d+\.\d+),(-?\d+\.\d+)/,
    /!3d(-?\d+\.\d+)!4d(-?\d+\.\d+)/,
    /[?&]q=(-?\d+\.\d+),(-?\d+\.\d+)/,
    /^(-?\d+\.\d+)\s*,\s*(-?\d+\.\d+)$/,
  ];
  for (const re of patterns) {
    const m = text.match(re);
    if (m) {
      const lat = parseFloat(m[1]), lng = parseFloat(m[2]);
      if (!isNaN(lat) && !isNaN(lng)) return { lat, lng };
    }
  }
  return null;
}

async function resolveMapsLink(text) {
  if (!text) return null;
  const direct = parseMapsLink(text);
  if (direct) return direct;
  // Shortened links (maps.app.goo.gl, goo.gl) don't contain coordinates in the URL itself —
  // we need to follow the redirect to get the real Google Maps URL, then parse that.
  if (!/goo\.gl/i.test(text)) return null;
  try {
    const proxied = `https://api.allorigins.win/get?url=${encodeURIComponent(text)}`;
    const res = await fetch(proxied);
    if (!res.ok) return null;
    const data = await res.json();
    const finalUrl = (data && data.status && data.status.url) || "";
    return parseMapsLink(finalUrl) || parseMapsLink((data && data.contents) || "");
  } catch (e) {
    return null;
  }
}

function openInGoogleMaps(loc, fallbackParts) {
  const q = loc
    ? `${loc.lat},${loc.lng}`
    : encodeURIComponent((fallbackParts || []).filter(Boolean).join(" "));
  window.open(`https://www.google.com/maps/search/?api=1&query=${q}`, "_blank");
}

  const [lngInput, setLngInput] = useState("");
  const [form, setForm] = useState({ name: "", code: "", territory: "", governorate: "", city: "" });

function download(filename, text) {
  const blob = new Blob([text], { type: "text/csv;charset=utf-8;" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

async function exportTableToPdf(title, headers, rows, filename) {
  const wrapper = document.createElement("div");
  wrapper.style.position = "fixed";
  wrapper.style.top = "-99999px";
  wrapper.style.left = "-99999px";
  wrapper.style.width = "800px";
  wrapper.style.background = "#ffffff";
  wrapper.style.padding = "24px";
  wrapper.style.direction = "rtl";
  wrapper.style.fontFamily = "Tahoma, Arial, sans-serif";

  const headHtml = headers.map(h => `<th style="border:1px solid #ccc;padding:8px;background:#12151B;color:#fff;font-size:13px;text-align:right;">${h}</th>`).join("");
  const bodyHtml = rows.map(r => `<tr>${r.map(c => `<td style="border:1px solid #ccc;padding:8px;font-size:12px;color:#111;text-align:right;">${c}</td>`).join("")}</tr>`).join("");

  wrapper.innerHTML = `
    <h2 style="margin:0 0 4px;font-size:18px;color:#111;">${title}</h2>
    <p style="margin:0 0 14px;font-size:11px;color:#666;">Etronic Fleet Dashboard · ${new Date().toISOString().slice(0, 10)}</p>
    <table style="width:100%;border-collapse:collapse;">
      <thead><tr>${headHtml}</tr></thead>
      <tbody>${bodyHtml}</tbody>
    </table>
  `;
  document.body.appendChild(wrapper);

  try {
    const canvas = await html2canvas(wrapper, { scale: 2, backgroundColor: "#ffffff" });
    document.body.removeChild(wrapper);

    const { jsPDF } = window.jspdf;
    const pdf = new jsPDF("p", "mm", "a4");
    const pageWidth = pdf.internal.pageSize.getWidth();
    const pageHeight = pdf.internal.pageSize.getHeight();
    const imgWidth = pageWidth;
    const imgHeight = (canvas.height * imgWidth) / canvas.width;
    const imgData = canvas.toDataURL("image/png");

    let heightLeft = imgHeight;
    let position = 0;
    pdf.addImage(imgData, "PNG", 0, position, imgWidth, imgHeight);
    heightLeft -= pageHeight;

    while (heightLeft > 0) {
      position = heightLeft - imgHeight;
      pdf.addPage();
      pdf.addImage(imgData, "PNG", 0, position, imgWidth, imgHeight);
      heightLeft -= pageHeight;
    }

    pdf.save(filename);
  } catch (err) {
    if (wrapper.parentNode) document.body.removeChild(wrapper);
    alert("حصل خطأ أثناء إنشاء PDF: " + err.message);
  }
}

function fileToBase64(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result.split(",")[1]);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

async function ocrReceipt(base64) {
  const res = await fetch(`https://vision.googleapis.com/v1/images:annotate?key=${VISION_API_KEY}`, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      requests: [{ image: { content: base64 }, features: [{ type: "TEXT_DETECTION" }] }]
    })
  });
  const data = await res.json();
  const text = data?.responses?.[0]?.fullTextAnnotation?.text || "";
  return text;
}

function parseReceiptText(text, vehiclesList, employeesList) {
  const result = { plate: "", date: "", liters: "", cost: "", odometer: "", driver: "" };
  if (!text) return result;

  // Plate: look for any known vehicle plate number appearing as a standalone number
  for (const v of vehiclesList) {
    const re = new RegExp(`(?:^|\\D)${v.plate}(?:\\D|$)`);
    if (re.test(text)) { result.plate = v.plate; break; }
  }

  // Driver: look for any known employee name appearing (partial match, case-insensitive)
  for (const emp of employeesList) {
    if (emp.name && text.toLowerCase().includes(String(emp.name).toLowerCase().split(" ")[0])) {
      result.driver = emp.name; break;
    }
  }

  // Date: dd/mm/yyyy, dd-mm-yyyy, yyyy-mm-dd
  let m = text.match(/(\d{4})[\/\-.](\d{1,2})[\/\-.](\d{1,2})/);
  if (m) {
    result.date = `${m[1]}-${String(m[2]).padStart(2, "0")}-${String(m[3]).padStart(2, "0")}`;
  } else {
    m = text.match(/(\d{1,2})[\/\-.](\d{1,2})[\/\-.](\d{4})/);
    if (m) result.date = `${m[3]}-${String(m[2]).padStart(2, "0")}-${String(m[1]).padStart(2, "0")}`;
  }

  // Liters: number followed by لتر / Ltr / L
  m = text.match(/(\d+(?:\.\d+)?)\s*(?:لتر|Ltr|litre|liter|L\b)/i);
  if (m) result.liters = m[1];

  // Odometer: number near عداد / كم / KM
  m = text.match(/(?:عداد|كم|km)\D{0,5}(\d{3,7})/i);
  if (m) result.odometer = m[1];

  // Total/cost: number near إجمالي / total / EGP / ج.م
  m = text.match(/(?:إجمالي|الإجمالي|total|EGP|ج\.?م)\D{0,5}(\d+(?:\.\d+)?)/i);
  if (m) result.cost = m[1];
  else {
    // fallback: largest decimal-looking number in text
    const nums = [...text.matchAll(/(\d+\.\d{1,2})/g)].map(x => parseFloat(x[1]));
    if (nums.length) result.cost = String(Math.max(...nums));
  }

  return result;
}

function FuelTab({ records, setRecords, vehicles, employees, isAdmin }) {
  const [form, setForm] = useState({ plate: "", date: "", liters: "", cost: "", odometer: "", driver: "" });
  const [page, setPage] = useState(1);
  const [photoData, setPhotoData] = useState(null);
  const [scanning, setScanning] = useState(false);
  const [scanNote, setScanNote] = useState("");

  const totalLiters = records.reduce((s, r) => s + Number(r.liters || 0), 0);
  const totalCost = records.reduce((s, r) => s + Number(r.cost || 0), 0);
  const avgPrice = totalLiters ? (totalCost / totalLiters) : 0;

  const sorted = useMemo(() => [...records].sort((a, b) => (b.date || "").localeCompare(a.date || "")), [records]);
  const paged = sorted.slice((page - 1) * PAGE_SIZE, page * PAGE_SIZE);

  const consumptionByPlate = useMemo(() => {
    const byPlate = {};
    records.forEach(r => {
      if (r.odometer) {
        if (!byPlate[r.plate]) byPlate[r.plate] = [];
        byPlate[r.plate].push(r);
      }
    });
    return Object.entries(byPlate).map(([plate, list]) => {
      const s = [...list].sort((a, b) => Number(a.odometer) - Number(b.odometer));
      const distance = s.length > 1 ? Number(s[s.length - 1].odometer) - Number(s[0].odometer) : 0;
      const liters = s.slice(1).reduce((sum, r) => sum + Number(r.liters || 0), 0);
      const kmPerLiter = liters > 0 ? distance / liters : 0;
      return { plate, distance, liters, kmPerLiter, fillCount: s.length };
    }).filter(x => x.distance > 0);
  }, [records]);

  async function handlePhoto(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => setPhotoData(reader.result);
    reader.readAsDataURL(file);

    setScanning(true);
    setScanNote("");
    try {
      const base64 = await fileToBase64(file);
      const text = await ocrReceipt(base64);
      const parsed = parseReceiptText(text, vehicles, employees);
      setForm(prev => ({
        plate: parsed.plate || prev.plate,
        date: parsed.date || prev.date,
        liters: parsed.liters || prev.liters,
        cost: parsed.cost || prev.cost,
        odometer: parsed.odometer || prev.odometer,
        driver: parsed.driver || prev.driver,
      }));
      setScanNote(text ? "✓ اتقرت البيانات من الريسيت — راجعها قبل ما تضيف" : "مقدرناش نقرا نص من الصورة، دخّل البيانات يدويًا");
    } catch (err) {
      setScanNote("حصل خطأ في القراءة الأوتوماتيكية: " + err.message);
    } finally {
      setScanning(false);
    }
  }
  function addRecord() {
    if (!form.plate || !form.date || !form.liters || !form.cost) return;
    setRecords([...records, { id: Date.now(), ...form, photo: photoData || null }]);
    setForm({ plate: "", date: "", liters: "", cost: "", odometer: "", driver: "" });
    setPhotoData(null);
    setScanNote("");
    setPage(1);
  }
  function removeRecord(id) {
    setRecords(records.filter(r => r.id !== id));
  }
  function exportCsv() {
    const header = "التاريخ,العربية,السائق,لتر,التكلفة,العداد\n";
    const rows = sorted.map(r => `${r.date},${r.plate},${r.driver || ""},${r.liters},${r.cost},${r.odometer || ""}`).join("\n");
    download("تقرير_الوقود.csv", "\uFEFF" + header + rows);
  }

  return (
    <div>
      <h2 className="font-ui font-extrabold text-xl mb-1" style={{ color: C.text }}>الوقود</h2>
      <p className="font-ui text-xs mb-5" style={{ color: C.muted }}>صوّر الريسيت وهيتقرا أوتوماتيك، أو دخّل البيانات يدويًا</p>

      <div className="flex flex-wrap gap-3 mb-6">
        <KpiCard icon={Fuel} value={records.length} label="عدد عمليات التعبئة" color={C.teal} />
        <KpiCard icon={Fuel} value={totalLiters.toFixed(0)} label="إجمالي اللترات" color={C.amber} />
        <KpiCard icon={TrendingUp} value={totalCost.toFixed(0)} label="إجمالي التكلفة (ج.م)" color={C.red} />
        <KpiCard icon={TrendingUp} value={avgPrice.toFixed(2)} label="متوسط سعر اللتر" color={C.teal} />

  const oilAlerts = useMemo(() => {
    const alerts = [];

    vehicles.forEach(v => {
      const plate = v.plate;

      if (logsForPlate.length === 0) return;
      const currentOdometer = Math.max(...logsForPlate.map(l => Number(l.odometer)));

      if (kmSinceOil >= OIL_INTERVAL_KM) {

function haversineKm(a, b) {
  const R = 6371;
  const dLat = (b.lat - a.lat) * Math.PI / 180;
  const dLng = (b.lng - a.lng) * Math.PI / 180;
  const la1 = a.lat * Math.PI / 180, la2 = b.lat * Math.PI / 180;
  const h = Math.sin(dLat / 2) ** 2 + Math.cos(la1) * Math.cos(la2) * Math.sin(dLng / 2) ** 2;
  return 2 * R * Math.asin(Math.sqrt(h));
}

function RouteTab({ stops, setStops, customerLocations, customers }) {
  const [q, setQ] = useState("");
  const [sorting, setSorting] = useState(false);

  const matches = useMemo(() => {
    if (!q.trim()) return [];
    const added = new Set(stops.map(s => s.uid));
    return customers
      .map(c => ({ ...c, uid: c.id }))
      .filter(c => !added.has(c.uid))
      .filter(c =>
        (c.name || "").toLowerCase().includes(q.toLowerCase()) ||
        String(c.code).toLowerCase().includes(q.toLowerCase()) ||
        (c.territory || "").toLowerCase().includes(q.toLowerCase())
      )
      .slice(0, 10);
  }, [q, stops, customers]);

  const territoryCount = new Set(stops.map(s => s.territory || "غير محدد")).size;
  const geoCount = stops.filter(s => customerLocations[s.uid]).length;

  function addStop(c) {
    setStops([...stops, c]);
    setQ("");
  }
  function removeStop(uid) {
    setStops(stops.filter(s => s.uid !== uid));
  }
  function moveStop(index, dir) {
    const next = [...stops];
    const j = index + dir;
    if (j < 0 || j >= next.length) return;
    [next[index], next[j]] = [next[j], next[index]];
    setStops(next);
  }
  function runSort(startPoint) {
    const withGeo = stops.filter(s => customerLocations[s.uid]);
    const withoutGeo = stops.filter(s => !customerLocations[s.uid]);

    let orderedGeo = [];
    if (withGeo.length > 0) {
      const remaining = withGeo.map(s => ({ ...s, ...customerLocations[s.uid] }));
      let current;
      if (startPoint) {
        // Start from whichever stop is nearest to the user's actual current location
        let bestIdx = 0, bestDist = Infinity;
        remaining.forEach((s, i) => {
          const d = haversineKm(startPoint, s);
          if (d < bestDist) { bestDist = d; bestIdx = i; }
        });
        current = remaining.splice(bestIdx, 1)[0];
      } else {
        current = remaining.shift();
      }
      orderedGeo.push(current);
      while (remaining.length) {
        let bestIdx = 0, bestDist = Infinity;
        remaining.forEach((s, i) => {
          const d = haversineKm(current, s);
          if (d < bestDist) { bestDist = d; bestIdx = i; }
        });
        current = remaining.splice(bestIdx, 1)[0];
        orderedGeo.push(current);
      }
    }
    const orderedText = [...withoutGeo].sort((a, b) => {
      const t = (a.territory || "").localeCompare(b.territory || "");
      if (t !== 0) return t;
      const g = (a.governorate || "").localeCompare(b.governorate || "");
      if (g !== 0) return g;
      return String(a.city || "").localeCompare(String(b.city || ""));
    });
    setStops([...orderedGeo, ...orderedText]);
  }
  function sortByLocation() {
    if (!navigator.geolocation) { runSort(null); return; }
    setSorting(true);
    navigator.geolocation.getCurrentPosition(
      (pos) => { runSort({ lat: pos.coords.latitude, lng: pos.coords.longitude }); setSorting(false); },
      () => { runSort(null); setSorting(false); },
      { enableHighAccuracy: true, timeout: 12000 }
    );
  }
  function clearRoute() {
    setStops([]);
  }

  return (
    <div>
      <h2 className="font-ui font-extrabold text-xl mb-1" style={{ color: C.text }}>خط السير</h2>
      <p className="font-ui text-xs mb-5" style={{ color: C.muted }}>ضيف العملاء اللي هتزورهم — الترتيب بيعتمد على الموقع GPS الفعلي لو محفوظ، وبيرجع للترتيب حسب المنطقة لو مش محفوظ</p>

      <div className="flex flex-wrap gap-3 mb-6">
        <KpiCard icon={MapPin} value={stops.length} label="عدد المحطات" color={C.teal} />
        <KpiCard icon={Navigation} value={geoCount} label="محطات بموقع GPS دقيق" color={C.teal} />
        <KpiCard icon={Building2} value={territoryCount} label="عدد المناطق في الرحلة" color={C.amber} />
      </div>

      <div className="rounded-2xl p-4 mb-6" style={{ background: C.surface, border: `1px solid ${C.border}` }}>
        <h3 className="font-ui font-bold text-sm mb-3" style={{ color: C.text }}>إضافة عميل لخط السير</h3>
        <SearchBox value={q} onChange={setQ} placeholder="دور بالاسم أو الكود أو المنطقة..." />
        {q.trim() !== "" && (
          <div className="space-y-2 -mt-2">
            {matches.length === 0 ? (
              <p className="font-ui text-xs" style={{ color: C.muted }}>مفيش نتائج</p>
            ) : matches.map(c => (
              <div key={c.uid} className="flex items-center gap-3 rounded-xl p-2.5" style={{ background: C.surface2, border: `1px solid ${C.border}` }}>
                <div className="flex-1">
                  <p className="font-ui font-semibold text-sm" style={{ color: C.text }}>{c.name || "بدون اسم"}</p>
                  <p className="font-ui text-xs" style={{ color: C.muted }}>{[c.territory, c.governorate, c.city].filter(Boolean).join(" · ")}{customerLocations[c.uid] ? " · 📍 موقع محفوظ" : ""}</p>
                </div>
                <button onClick={() => addStop(c)} className="p-1.5 rounded-lg" style={{ background: `${C.amber}22` }}>
                  <Plus size={14} color={C.amber} />
                </button>
              </div>
            ))}
          </div>
        )}
      </div>

      {stops.length > 0 && (
        <div className="flex items-center gap-2 mb-4">
          <button onClick={sortByLocation} disabled={sorting} className="flex items-center gap-1.5 px-3 py-2 rounded-lg font-ui text-xs font-semibold disabled:opacity-50"
            style={{ background: `${C.teal}22`, color: C.teal }}>
            <Navigation size={14} /> {sorting ? "بيحدد موقعك دلوقتي..." : "رتب حسب الموقع"}
          </button>
          <button onClick={clearRoute} className="flex items-center gap-1.5 px-3 py-2 rounded-lg font-ui text-xs font-semibold"
            style={{ background: `${C.red}18`, color: C.red }}>
            <Trash2 size={14} /> تفريغ الخط
          </button>
        </div>
      )}

      {stops.length === 0 ? (
        <EmptyState text="لسه مفيش عملاء في خط السير. دور عليهم فوق وضيفهم." />
      ) : (
        <div className="space-y-2">
          {stops.map((s, i) => {
            const hasGeo = !!customerLocations[s.uid];
            return (
              <div key={s.uid} className="flex items-center gap-3 rounded-xl p-3" style={{ background: C.surface, border: `1px solid ${C.border}` }}>

    </div>

}

function parseOdometerText(text) {
  if (!text) return "";
  // Prefer a number explicitly near "km"/"كم" markers
  let m = text.match(/(?:km|كم)\D{0,5}(\d{3,7})/i);
  if (m) return m[1];
  // Otherwise take the longest standalone digit run (odometers are usually the biggest number on the dash)
  const nums = [...text.matchAll(/\d{3,7}/g)].map(x => x[0]);
  if (!nums.length) return "";
  return nums.sort((a, b) => b.length - a.length)[0];
}

function computePerFillConsumption(fuelRecords) {
  const byPlate = {};
  fuelRecords.forEach(r => {
    if (r.odometer) {
      if (!byPlate[r.plate]) byPlate[r.plate] = [];
      byPlate[r.plate].push(r);
    }
  });
  const rows = [];
  Object.entries(byPlate).forEach(([plate, list]) => {
    const s = [...list].sort((a, b) => (a.date || "").localeCompare(b.date || "") || Number(a.odometer) - Number(b.odometer));
    for (let i = 1; i < s.length; i++) {
      const km = Number(s[i].odometer) - Number(s[i - 1].odometer);
      const liters = Number(s[i].liters || 0);
      const kmPerLiter = liters > 0 ? km / liters : 0;
      rows.push({ plate, date: s[i].date, prevOdometer: Number(s[i - 1].odometer), odometer: Number(s[i].odometer), km, liters, kmPerLiter });
    }
  });
  return rows.sort((a, b) => (b.date || "").localeCompare(a.date || ""));
}

function ReportsTab({ fuelRecords, odometerLogs, vehicles }) {
  const [fuelFrom, setFuelFrom] = useState("");
  const [fuelTo, setFuelTo] = useState("");
  const [kmFrom, setKmFrom] = useState("");
  const [kmTo, setKmTo] = useState("");

  const consumptionByPlate = useMemo(() => computeConsumptionByPlate(fuelRecords), [fuelRecords]);

  const perFillAll = useMemo(() => computePerFillConsumption(fuelRecords), [fuelRecords]);
  const perFill = useMemo(() => perFillAll.filter(r =>
    (!fuelFrom || r.date >= fuelFrom) && (!fuelTo || r.date <= fuelTo)
  ), [perFillAll, fuelFrom, fuelTo]);

  const dailyByPlateAll = useMemo(() => {
    const byPlate = {};
    odometerLogs.forEach(l => {
      if (!byPlate[l.plate]) byPlate[l.plate] = [];
      byPlate[l.plate].push(l);
    });
    const rows = [];
    Object.entries(byPlate).forEach(([plate, list]) => {
      const s = [...list].sort((a, b) => (a.date || "").localeCompare(b.date || ""));
      for (let i = 1; i < s.length; i++) {
        const days = (new Date(s[i].date) - new Date(s[i - 1].date)) / 86400000;
        const km = Number(s[i].odometer) - Number(s[i - 1].odometer);
        if (days > 0 && km >= 0) {
          rows.push({ plate, from: s[i - 1].date, to: s[i].date, km, avgPerDay: km / days });
        }
      }
    });
    return rows.sort((a, b) => b.to.localeCompare(a.to));
  }, [odometerLogs]);

  const dailyByPlate = useMemo(() => dailyByPlateAll.filter(r =>
    (!kmFrom || r.to >= kmFrom) && (!kmTo || r.from <= kmTo)
  ), [dailyByPlateAll, kmFrom, kmTo]);

    const header = "العربية,الكيلومترات,اللترات,كم/لتر\n";

function useFirestoreState(key, initialFn) {
  const [state, setState] = useState(initialFn());
  const [ready, setReady] = useState(false);
  const stateRef = React.useRef(state);
  stateRef.current = state;

  React.useEffect(() => {
    const ref = db.collection("etronic_data").doc(key);
    const unsub = ref.onSnapshot(
      (snap) => {
        if (snap.exists) {
          setState(snap.data().value);
        } else {
          ref.set({ value: initialFn() }).catch(() => {});
        }
        setReady(true);
      },
      () => setReady(true)
    );
    return unsub;
  }, [key]);

  function setAndSync(updater) {
    const next = typeof updater === "function" ? updater(stateRef.current) : updater;
    setState(next);
    db.collection("etronic_data").doc(key).set({ value: next }).catch(() => {});
  }

  return [state, setAndSync, ready];
}

          <button onClick={() => auth.signOut()} className="w-full text-right font-ui text-xs font-semibold px-3 py-2 rounded-lg" style={{ background: `${C.red}18`, color: C.red }}>

function LoginScreen({ errorMsg }) {
  const [email, setEmail] = useState("");
  const [password, setPassword] = useState("");
  const [error, setError] = useState(errorMsg || "");
  const [loading, setLoading] = useState(false);

  function handleLogin() {
    if (!email || !password) return;
    setError(""); setLoading(true);
    auth.signInWithEmailAndPassword(email.trim(), password)
      .catch(err => setError("مقدرناش نسجل دخولك: " + err.message))
      .finally(() => setLoading(false));
  }

  return (
    <div dir="rtl" className="font-ui min-h-screen flex items-center justify-center p-6" style={{ background: C.bg }}>
      <style>{FONTS}</style>
      <div className="w-full max-w-sm rounded-2xl p-6" style={{ background: C.surface, border: `1px solid ${C.border}` }}>
        <img src={LOGO_URI} alt="Etronic Fleet" className="h-14 mb-1 mx-auto object-contain" />
        <p className="font-ui text-xs mb-6 text-center" style={{ color: C.muted }}>سجل دخولك عشان تستخدم النظام</p>
        <div className="space-y-3">
          <input type="email" placeholder="الإيميل" value={email} onChange={e => setEmail(e.target.value)}
            className="w-full rounded-lg px-3 py-2.5 font-ui text-sm outline-none" style={{ background: C.surface2, border: `1px solid ${C.border}`, color: C.text }} />
          <input type="password" placeholder="كلمة المرور" value={password} onChange={e => setPassword(e.target.value)}
            onKeyDown={e => e.key === "Enter" && handleLogin()}
            className="w-full rounded-lg px-3 py-2.5 font-ui text-sm outline-none" style={{ background: C.surface2, border: `1px solid ${C.border}`, color: C.text }} />
          {error && <p className="font-ui text-xs" style={{ color: C.red }}>{error}</p>}
          <button onClick={handleLogin} disabled={loading}
            className="w-full py-2.5 rounded-lg font-ui text-sm font-bold disabled:opacity-50" style={{ background: C.amber, color: "#0B0E13" }}>
            {loading ? "بيدخل..." : "تسجيل الدخول"}
          </button>
        </div>
      </div>
    </div>
  );
}

function AdminTab({ accounts, setAccounts, currentUser }) {
  const [form, setForm] = useState({ name: "", email: "", password: "" });
  const [creating, setCreating] = useState(false);
  const [err, setErr] = useState("");

  function createAccount() {
    if (!form.name || !form.email || !form.password) return;
    if (form.password.length < 6) { setErr("كلمة المرور لازم تكون 6 حروف/أرقام على الأقل"); return; }
    setErr(""); setCreating(true);
    secondaryAuth.createUserWithEmailAndPassword(form.email.trim(), form.password)
      .then(() => {
        secondaryAuth.signOut();
        setAccounts([...accounts, { email: form.email.trim(), name: form.name, role: "employee", active: true }]);
        setForm({ name: "", email: "", password: "" });
      })
      .catch(e => setErr("مقدرناش ننشئ الحساب: " + e.message))
      .finally(() => setCreating(false));
  }
  function toggleActive(email) {
    setAccounts(accounts.map(a => a.email === email ? { ...a, active: !a.active } : a));

  return (
    <div>
      <h2 className="font-ui font-extrabold text-xl mb-4" style={{ color: C.text }}>إدارة الحسابات</h2>

      <div className="rounded-2xl p-4 mb-5" style={{ background: C.surface, border: `1px solid ${C.border}` }}>

          <input type="email" placeholder="الإيميل" value={form.email} onChange={e => setForm({ ...form, email: e.target.value })}

          <input type="text" placeholder="كلمة مرور مؤقتة (6 حروف على الأقل)" value={form.password} onChange={e => setForm({ ...form, password: e.target.value })}
            className="rounded-lg px-2 py-2 font-mono text-xs outline-none" style={{ background: C.surface2, border: `1px solid ${C.border}`, color: C.text }} />
        </div>
        {err && <p className="font-ui text-xs mt-2" style={{ color: C.red }}>{err}</p>}
        <button onClick={createAccount} disabled={creating} className="flex items-center gap-1.5 mt-3 px-3 py-2 rounded-lg font-ui text-xs font-semibold disabled:opacity-50"
          style={{ background: `${C.amber}22`, color: C.amber }}>
          <Plus size={14} /> {creating ? "بينشئ الحساب..." : "إنشاء حساب"}
        </button>
      </div>

      <div className="space-y-2">
        {accounts.map(a => (
          <div key={a.email} className="flex items-center gap-3 rounded-xl p-3" style={{ background: C.surface, border: `1px solid ${C.border}` }}>
            <div className="w-9 h-9 rounded-full flex items-center justify-center shrink-0" style={{ background: a.active ? `${C.teal}22` : `${C.red}18` }}>
              <Users size={14} color={a.active ? C.teal : C.red} />
            </div>
            <div className="flex-1 min-w-0">
              <p className="font-ui font-semibold text-sm truncate" style={{ color: C.text }}>{a.name} {a.role === "admin" ? "(أدمن)" : ""}</p>
              <p className="font-ui text-xs truncate" style={{ color: C.muted }}>{a.email}</p>
            </div>
            {a.email !== currentUser.email && (
              <button onClick={() => toggleActive(a.email)}
                className="px-3 py-1.5 rounded-lg font-ui text-[11px] font-semibold shrink-0"
                style={{ background: a.active ? `${C.red}18` : `${C.teal}22`, color: a.active ? C.red : C.teal }}>
                {a.active ? "إيقاف الحساب" : "تفعيل الحساب"}
              </button>
            )}

        ))}
      </div>
      <p className="font-ui text-[11px] mt-3" style={{ color: C.muted }}>* "إيقاف الحساب" بيمنع الموظف من الدخول للنظام فورًا، لكن مش بيحذف حساب تسجيل الدخول بتاعه نهائيًا (ده محتاج إعداد إضافي في السيرفر). لو عايز حذف نهائي كلمني.</p>
    </div>
  );
}

function AuthGate() {
  const [user, setUser] = useState(undefined);
  const [accountStatus, setAccountStatus] = useState(undefined);
  const [errorMsg, setErrorMsg] = useState("");

  React.useEffect(() => {
    const unsub = auth.onAuthStateChanged(u => setUser(u));
    return unsub;
  }, []);

  React.useEffect(() => {
    if (!user) { setAccountStatus(undefined); return; }
    const ref = db.collection("etronic_data").doc("etronic_accounts");

    async function decide(snap) {
      const list = snap.exists ? (snap.data().value || []) : [];
      if (list.length === 0) {
        // Never trust a cached/offline empty result to mean "no accounts exist yet" —
        // force a fresh read from the server before ever bootstrapping an admin.
        try {
          const serverSnap = await ref.get({ source: "server" });
          const serverList = serverSnap.exists ? (serverSnap.data().value || []) : [];
          if (serverList.length === 0) {
            const bootstrapped = [{ email: user.email, name: user.email, role: "admin", active: true }];
            await ref.set({ value: bootstrapped });
            setAccountStatus({ role: "admin", active: true });
          } else {
            const mine = serverList.find(a => a.email === user.email);
            handleAccount(mine);
          }
        } catch (e) {
          setErrorMsg("مقدرناش نتأكد من حسابك (مشكلة اتصال). جرب تاني.");
          auth.signOut();
        }
        return;
      }
      const mine = list.find(a => a.email === user.email);
      handleAccount(mine);
    }

    function handleAccount(mine) {
      if (!mine) {
        setErrorMsg("الحساب ده مش مسجل في النظام. كلم الأدمن يضيفك.");
        auth.signOut();
        return;
      }
      if (!mine.active) {
        setErrorMsg("حسابك متوقف حاليًا. كلم الأدمن.");
        auth.signOut();
        return;
      }
      setAccountStatus(mine);
    }

    const unsub = ref.onSnapshot(decide);
    return unsub;
  }, [user]);

  if (user === undefined || (user && accountStatus === undefined)) {
    return (
      <div dir="rtl" className="font-ui min-h-screen flex items-center justify-center" style={{ background: C.bg }}>
        <style>{FONTS}</style>
        <p className="font-ui text-sm" style={{ color: C.muted }}>بيحمّل...</p>
      </div>
    );
  }
  if (!user) return <LoginScreen errorMsg={errorMsg} />;
  return <EtronicDashboard user={user} isAdmin={accountStatus.role === "admin"} />;
}

class ErrorBoundary extends React.Component {
  constructor(props) { super(props); this.state = { error: null }; }
  static getDerivedStateFromError(error) { return { error }; }
  render() {
    if (this.state.error) {
      return (
        <div dir="rtl" style={{ background: "#12151B", color: "#E15D44", minHeight: "100vh", padding: 24, fontFamily: "monospace", fontSize: 13, whiteSpace: "pre-wrap" }}>
          حصل خطأ في التطبيق:
          {"\n\n"}{String((this.state.error && this.state.error.message) || this.state.error)}
        </div>
      );
    }
    return this.props.children;
  }
}

function FirebaseErrorScreen({ error }) {
  return (
    <div dir="rtl" style={{ background: "#12151B", color: "#E15D44", minHeight: "100vh", padding: 24, fontFamily: "monospace", fontSize: 13, whiteSpace: "pre-wrap" }}>
      مقدرناش نوصل Firebase:
      {"\n\n"}{String((error && error.message) || error)}
      {"\n\n"}لو فاتح الملف مباشرة من جهازك (file://) جرب افتحه من رابط الموقع المنشور بدل كده.
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
if (firebaseInitError) {
  root.render(<FirebaseErrorScreen error={firebaseInitError} />);
} else {
  root.render(<ErrorBoundary><AuthGate /></ErrorBoundary>);
}
